[server]
# Required: lets Streamlit serve files from static/ at /app/static/,
# giving the embedded dashboard a real origin so IndexedDB/localStorage work.
enableStaticServing = true

[theme]
base = "dark"
backgroundColor = "#1a1a2e"
secondaryBackgroundColor = "#16213e"
primaryColor = "#f59e0b"
textColor = "#f1f5f9"
